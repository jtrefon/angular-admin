name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm --prefix docs/site ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build Angular app
        run: npm run build

      - name: Build docs site
        run: DOCUSAURUS_BASE_URL=/ DOCUSAURUS_URL=https://jtrefon.github.io npm run build:docs
