name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/site/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install root dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm --prefix docs/site ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build Pages site
        env:
          PAGES_REPO_NAME: angular-admin
          PAGES_BASE_URL: /angular-admin/
          PAGES_SITE_URL: https://jtrefon.github.io
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
