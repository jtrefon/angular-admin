<div class="advanced-form">
  <div class="field-grid">
    <ui-field label="Workspace name">
      <ui-input type="text" value="Northwind Operations" />
    </ui-field>

    <ui-field label="Region">
      <ui-select [options]="regionOptions" value="emea" />
    </ui-field>

    <ui-field label="Go live date">
      <ui-input type="date" value="2026-04-18" />
    </ui-field>

    <ui-field label="Owner">
      <ui-input type="text" value="Aisling Byrne" />
    </ui-field>

    <ui-field label="Description" [full]="true">
      <ui-textarea
        [rows]="4"
        value="Use this form pattern for workspace configuration, request intake, exception review, and admin workflow setup."
      />
    </ui-field>
  </div>

  <div class="form-inline-grid">
    <div class="segmented-control">
      <button type="button" class="segmented-control__item is-active">Live</button>
      <button type="button" class="segmented-control__item">Draft</button>
      <button type="button" class="segmented-control__item">Archived</button>
    </div>

    <div class="switch-row">
      <ui-switch [checked]="true">SSO enforced</ui-switch>
      <ui-switch [checked]="true">Audit logging</ui-switch>
    </div>
  </div>

  <div class="toggle-row">
    <ui-check [checked]="true">Require manager approval</ui-check>
    <ui-check [checked]="true">Block external exports</ui-check>
    <ui-check type="radio" name="mode" [checked]="true">Single region</ui-check>
    <ui-check type="radio" name="mode">Multi region</ui-check>
  </div>

  <div class="button-row">
    <ui-button variant="ghost">Save draft</ui-button>
    <ui-button variant="secondary">Request review</ui-button>
    <ui-button>Publish config</ui-button>
  </div>
</div>
