<div class="advanced-form">
  <div class="field-grid">
    <label class="ui-field">
      <span class="ui-label">Workspace name</span>
      <input class="ui-input" type="text" value="Northwind Operations" />
    </label>

    <label class="ui-field">
      <span class="ui-label">Region</span>
      <select class="ui-input">
        <option>EMEA</option>
        <option>Americas</option>
        <option>APAC</option>
      </select>
    </label>

    <label class="ui-field">
      <span class="ui-label">Go live date</span>
      <input class="ui-input" type="date" value="2026-04-18" />
    </label>

    <label class="ui-field">
      <span class="ui-label">Owner</span>
      <input class="ui-input" type="text" value="Aisling Byrne" />
    </label>

    <label class="ui-field ui-field--full">
      <span class="ui-label">Description</span>
      <textarea class="ui-input ui-textarea" rows="4">Use this form pattern for workspace configuration, request intake, exception review, and admin workflow setup.</textarea>
    </label>
  </div>

  <div class="form-inline-grid">
    <div class="segmented-control">
      <button type="button" class="segmented-control__item is-active">Live</button>
      <button type="button" class="segmented-control__item">Draft</button>
      <button type="button" class="segmented-control__item">Archived</button>
    </div>

    <div class="switch-row">
      <label class="ui-switch">
        <input type="checkbox" checked />
        <span class="ui-switch__track"></span>
        <span>SSO enforced</span>
      </label>
      <label class="ui-switch">
        <input type="checkbox" checked />
        <span class="ui-switch__track"></span>
        <span>Audit logging</span>
      </label>
    </div>
  </div>

  <div class="toggle-row">
    <label class="ui-check">
      <input type="checkbox" checked />
      <span>Require manager approval</span>
    </label>
    <label class="ui-check">
      <input type="checkbox" checked />
      <span>Block external exports</span>
    </label>
    <label class="ui-check ui-check--radio">
      <input type="radio" name="mode" checked />
      <span>Single region</span>
    </label>
    <label class="ui-check ui-check--radio">
      <input type="radio" name="mode" />
      <span>Multi region</span>
    </label>
  </div>
</div>
