<article class="swatch-card">
  <div class="swatch-card__preview" [style.background]="'var(' + variable() + ')'"></div>
  <div class="swatch-card__content">
    <p class="swatch-card__name">{{ name() }}</p>
    <p class="swatch-card__meta">{{ variable() }}</p>
    <p class="swatch-card__meta">{{ hex() }}</p>
  </div>
</article>
