<div class="timeline">
  @for (item of items(); track item.title) {
    <div class="timeline-item">
      <span class="timeline-item__dot"></span>
      <div>
        <p class="timeline-item__title">{{ item.title }}</p>
        <p class="timeline-item__meta">{{ item.meta }}</p>
      </div>
    </div>
  }
</div>
